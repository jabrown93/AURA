name: Release aura beta image

on:
  workflow_dispatch:
  push:
    branches:
      - "beta*"
    paths:
      - "backend/**"
      - "frontend/**"
      - "VERSION.txt"

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Extract version
        id: version
        run: |
          if [[ -f VERSION.txt ]]; then
            echo "APP_VERSION=$(cat VERSION.txt)-beta" >> "$GITHUB_ENV"
          else
            echo "APP_VERSION=dev-beta" >> "$GITHUB_ENV"
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            APP_VERSION=${{ env.APP_VERSION }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/aura:beta
            ghcr.io/${{ github.repository_owner }}/aura:${{ env.APP_VERSION }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: 'v3.1.1'

      - name: Sign image (keyless)
        env:
          DIGEST: ${{ steps.image.outputs.digest }}
        run: |
          if [ -z "${DIGEST}" ]; then
            echo "::error::build-push-action produced no digest; cannot sign image" >&2
            exit 1
          fi
          cosign sign --yes "ghcr.io/${{ github.repository_owner }}/aura@${DIGEST}"
