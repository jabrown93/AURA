name: Edge image

# Publishes the rolling :edge channel — the current tip of main, built on every push,
# independent of releases. Tagged commits are built by release.yml instead.
#
#   push to main -> ghcr.io/<owner>/aura:edge + :edge-<sha>
#
# semantic-release's own version-bump commit carries [skip ci], which GitHub honours
# natively, so a release does not produce an :edge build. :edge therefore trails
# :latest by exactly that bump commit (VERSION.txt / version.json / CHANGELOG.md only)
# until the next real push to main.

on:
  push:
    branches: [main]

permissions:
  contents: read

# Serialize :edge builds so a slower older build can't finish last and win the
# floating tag. GitHub also cancels superseded *pending* runs in the group, so a burst
# of pushes collapses to the newest — which is the right semantic for a rolling tag.
concurrency:
  group: edge-image
  cancel-in-progress: false

jobs:
  edge-image:
    name: Build & push :edge
    runs-on: ubuntu-latest
    # Belt-and-braces alongside GitHub's native [skip ci] handling for the release
    # commit; see the header note on why :edge skips it.
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/aura
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Compute image tags and APP_VERSION
        id: meta
        run: |
          # Base the edge version on the last released version with an -edge.<sha>
          # suffix, so the app reports something SemVer-ordered that sorts below the
          # next release but identifies the exact commit baked in.
          head_sha="$(git rev-parse --short=7 HEAD)"
          base="$(cat VERSION.txt 2>/dev/null || echo v0.0.0)"
          echo "tags=${IMAGE}:edge,${IMAGE}:edge-${head_sha}" >> "$GITHUB_OUTPUT"
          echo "app_version=${base}-edge.${head_sha}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.app_version }}
          tags: ${{ steps.meta.outputs.tags }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: "v3.1.1"

      - name: Sign image (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          if [ -z "${DIGEST}" ]; then
            echo "::error::build-push-action produced no digest; cannot sign image" >&2
            exit 1
          fi
          cosign sign --yes "${IMAGE}@${DIGEST}"
