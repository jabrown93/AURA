name: Release

# Automated versioning + image publish.
#
#   push to main            -> semantic-release (stable) + always publish :edge
#   push to beta            -> semantic-release (prerelease) + publish :beta on release
#   schedule (weekly, Mon)  -> roll up accumulated dependency bumps into a patch release
#   workflow_dispatch       -> manual run (release if there are releasable commits)
#
# The image is built ONCE per run and tagged for whichever channel applies.

on:
  push:
    branches: [main, beta]
  schedule:
    - cron: "0 9 * * 1" # Mondays 09:00 UTC — weekly dependency roll-up release
  workflow_dispatch:

permissions:
  contents: read

# Serialize releases so two quick merges can't race semantic-release / tags.
concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: semantic-release
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the version-bump commit, create the tag + GitHub Release
    outputs:
      published: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}
      channel: ${{ steps.semantic.outputs.new_release_channel }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full history + tags so semantic-release can determine the last release.
          fetch-depth: 0
          persist-credentials: true

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@b12c8f6015dc215fe37bc154d4ad456dd3833c90 # v6.0.0
        with:
          # commit-analyzer, release-notes-generator, changelog, git and github
          # ship with the action; only exec must be added.
          extra_plugins: |
            @semantic-release/exec@7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The weekly scheduled run promotes dependency bumps to a patch release.
          RELEASE_DEPS: ${{ github.event_name == 'schedule' }}

  image:
    name: Build & push image
    needs: release
    runs-on: ubuntu-latest
    # Every main push publishes :edge; releases (main or beta) publish their tags.
    # Beta pushes without a release, and empty weekly runs, build nothing.
    if: >-
      needs.release.outputs.published == 'true' ||
      (github.event_name == 'push' && github.ref_name == 'main')
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/aura
      PUBLISHED: ${{ needs.release.outputs.published }}
      VERSION: ${{ needs.release.outputs.version }}
      CHANNEL: ${{ needs.release.outputs.channel }}
    steps:
      - name: Plan checkout ref
        id: plan
        run: |
          # On a release, build the tag so the baked CHANGELOG/VERSION files match
          # the release; otherwise build the pushed commit for the rolling :edge.
          if [[ "${PUBLISHED}" == "true" ]]; then
            echo "ref=v${VERSION}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.plan.outputs.ref }}
          persist-credentials: false

      - name: Plan tags and APP_VERSION
        id: meta
        run: |
          # Derive the sha from the checked-out HEAD so :edge-<sha> and the edge
          # APP_VERSION describe the commit actually baked into the image. On a
          # release run that's the semantic-release bump commit, not GITHUB_SHA.
          head_sha="$(git rev-parse --short=7 HEAD)"
          if [[ "${PUBLISHED}" == "true" ]]; then
            app_version="v${VERSION}"
            if [[ "${CHANNEL}" == "beta" ]]; then
              tags="${IMAGE}:beta,${IMAGE}:v${VERSION}"
            else
              tags="${IMAGE}:latest,${IMAGE}:v${VERSION},${IMAGE}:edge,${IMAGE}:edge-${head_sha}"
            fi
          else
            # Edge build: base off the current version file with an -edge suffix.
            base="$(cat VERSION.txt 2>/dev/null || echo v0.0.0)"
            app_version="${base}-edge.${head_sha}"
            tags="${IMAGE}:edge,${IMAGE}:edge-${head_sha}"
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"
          echo "app_version=${app_version}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: linux/amd64,

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.app_version }}
          tags: ${{ steps.meta.outputs.tags }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: "v3.1.1"

      - name: Sign image (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          if [ -z "${DIGEST}" ]; then
            echo "::error::build-push-action produced no digest; cannot sign image" >&2
            exit 1
          fi
          cosign sign --yes "${IMAGE}@${DIGEST}"
