name: Release

# Builds and publishes the release image for a tag, driven by the GitHub Release that
# version-release.yml's semantic-release run publishes.
#
#   tag v1.2.0        -> ghcr.io/<owner>/aura:v1.2.0 + :latest
#   tag v1.2.0-beta.1 -> ghcr.io/<owner>/aura:v1.2.0-beta.1 + :beta
#
# :latest only ever moves on a stable release. The rolling :edge channel is built
# by edge.yml, not here — this workflow only ever builds released tags.
#
# WHY `release: published` AND NOT `push: tags` — this is load-bearing, do not
# "simplify" it back. semantic-release tags its own `chore(release): ... [skip ci]`
# bump commit, and GitHub's skip-ci handling applies to *any* push event, tag pushes
# included (https://github.com/orgs/community/discussions/179637,
# https://github.com/actions/runner/issues/1049). A `push: tags` trigger here would
# therefore be silently skipped on every release and no image would ever be built.
# Release events are not filtered by commit message, so they fire regardless. The
# Release is created with the App token (not the default GITHUB_TOKEN, whose events
# deliberately never trigger workflows), which is what lets this run at all.
#
# semantic-release pushes the git tag *before* @semantic-release/github publishes the
# Release, so the tag is guaranteed to exist by the time this runs.
#
# Consequence: a tag pushed by hand, with no GitHub Release, builds nothing — use the
# workflow_dispatch below for that, and to rebuild a tag whose original run has aged
# out of GitHub's 30-day re-run window.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      publish_tag:
        description: >-
          Existing git tag to (re)build and publish (e.g. v1.0.0). A stable tag is
          published as :latest + :v<version>; a prerelease tag as :beta + :v<version>.
        required: true
        type: string

permissions:
  contents: read

# semantic-release can tag two close-together prereleases (or a prerelease and a
# stable release) faster than a multi-platform build+push completes. Without this,
# their runs race, and whichever finishes last wins the shared floating tag (:beta
# or :latest) — possibly the OLDER version, silently rolling back anyone pulling the
# floating tag. A single global group serializes all release-image runs so the
# floating tag always ends up on the most recently built image.
concurrency:
  group: release-image
  cancel-in-progress: false

jobs:
  release-image:
    name: Build & push image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    env:
      IMAGE: ghcr.io/${{ github.repository_owner }}/aura
    steps:
      - name: Resolve and validate tag
        id: tag
        env:
          # Exactly one of these is set: the dispatch input, or the published Release's
          # tag. Both are validated by the same anchored pattern below rather than
          # trusting either source.
          PUBLISH_TAG: ${{ github.event.inputs.publish_tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          tag="${PUBLISH_TAG:-${RELEASE_TAG}}"
          # Reject anything that isn't a clean vX.Y.Z[-suffix] tag before it is written
          # to $GITHUB_OUTPUT / used as a checkout ref or Docker tag. The anchored
          # pattern also rejects newlines (output-injection) and any char illegal in a
          # Docker tag (e.g. '+', '/', whitespace). Existence of the tag is enforced by
          # the checkout step below.
          if [[ ! "${tag}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "::error::tag '${tag}' must be a vX.Y.Z[-suffix] tag" >&2
            exit 1
          fi
          echo "ref=${tag}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ steps.tag.outputs.ref }}
          persist-credentials: false

      - name: Compute image tags
        id: meta
        env:
          VERSION: ${{ steps.tag.outputs.ref }}
        run: |
          # A prerelease tag carries a SemVer suffix (v1.2.0-beta.1); a stable one
          # never does. That distinction is the only thing separating :beta from
          # :latest, so it is read off the tag rather than passed between workflows.
          FLOATING="latest"
          if [[ "${VERSION}" == *-* ]]; then
            FLOATING="beta"
          fi
          echo "tags=${IMAGE}:${VERSION},${IMAGE}:${FLOATING}" >> "$GITHUB_OUTPUT"
          echo "app_version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c # v4.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: |
            APP_VERSION=${{ steps.meta.outputs.app_version }}
          tags: ${{ steps.meta.outputs.tags }}
          # Attach a CycloneDX SBOM + max provenance as OCI referrers on the image
          # (inspect: `docker buildx imagetools inspect --format '{{json .SBOM}}' <img>`).
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          # Pin the cosign binary (not just the installer) so signature/bundle format
          # stays stable and Kyverno verification is reproducible.
          cosign-release: "v3.1.1"

      # Keyless (Fulcio/rekor) signature over the pushed digest so the homelab Kyverno
      # verify-ghcr-images policy can verify this image.
      - name: Sign image (keyless)
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          if [ -z "${DIGEST}" ]; then
            echo "::error::build-push-action produced no digest; cannot sign image" >&2
            exit 1
          fi
          cosign sign --yes "${IMAGE}@${DIGEST}"
