name: CI

on:
  pull_request:
    branches: [main, beta]
  push:
    # main/beta = post-merge run. renovate/** lets Renovate's branch-automerge
    # updates (which never open a PR) run CI on the branch so the default-branch
    # ruleset can fast-forward the target branch once the branch is green.
    branches: [main, beta, 'renovate/**']

permissions:
  contents: read

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    env:
      # mattn/go-sqlite3 is a cgo package; the backend does not build without it.
      CGO_ENABLED: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "${unformatted}" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "${unformatted}"
            exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        env:
          # config.init() creates CONFIG_PATH (default /config, not writable in
          # CI) at package init, so any test that transitively imports config
          # panics. Point it at a writable dir, as documented for local/test runs.
          CONFIG_PATH: ${{ runner.temp }}/aura-config
        run: go test ./...

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
