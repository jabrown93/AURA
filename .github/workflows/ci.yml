name: CI

on:
  pull_request:
    branches: [main]
  push:
    # main = post-merge run. renovate/** lets Renovate's branch-automerge
    # updates (which never open a PR) run CI on the branch so the default-branch
    # ruleset can fast-forward main once the branch is green.
    branches: [main, 'renovate/**']

permissions:
  contents: read

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: backend
    env:
      # mattn/go-sqlite3 is a cgo package; the backend does not build without it.
      CGO_ENABLED: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "${unformatted}" ]; then
            echo "::error::gofmt found unformatted files:"
            echo "${unformatted}"
            exit 1
          fi

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
