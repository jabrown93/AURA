basePath: /
definitions:
  autodownload.AutoDownloadResult:
    properties:
      item:
        type: string
      overall_message:
        type: string
      overall_result:
        type: string
      sets:
        items:
          $ref: '#/definitions/autodownload.AutoDownloadSetResult'
        type: array
    type: object
  autodownload.AutoDownloadSetResult:
    properties:
      id:
        type: string
      reason:
        type: string
      result:
        type: string
      title:
        type: string
      user_created:
        type: string
    type: object
  config.Config:
    properties:
      auth:
        allOf:
        - $ref: '#/definitions/config.Config_Auth'
        description: Authentication settings.
      auto_download:
        allOf:
        - $ref: '#/definitions/config.Config_AutoDownload'
        description: Auto-download settings.
      database:
        allOf:
        - $ref: '#/definitions/config.Config_Database'
        description: Database configuration settings.
      images:
        allOf:
        - $ref: '#/definitions/config.Config_Images'
        description: Image settings.
      labels_and_tags:
        allOf:
        - $ref: '#/definitions/config.Config_LabelsAndTags'
        description: Labels and tags settings.
      logging:
        allOf:
        - $ref: '#/definitions/config.Config_Logging'
        description: Logging configuration settings.
      media_server:
        allOf:
        - $ref: '#/definitions/config.Config_MediaServer'
        description: Media server integration settings.
      mediux:
        allOf:
        - $ref: '#/definitions/config.Config_Mediux'
        description: MediUX integration settings.
      notifications:
        allOf:
        - $ref: '#/definitions/config.Config_Notifications'
        description: Notification settings.
      sonarr_radarr:
        allOf:
        - $ref: '#/definitions/config.Config_SonarrRadarr_Apps'
        description: List of Sonarr/Radarr instances to integrate with.
      tmdb:
        allOf:
        - $ref: '#/definitions/config.Config_TMDB'
        description: TMDB (The Movie Database) integration settings.
    type: object
  config.Config_Auth:
    properties:
      enabled:
        description: Whether to enable authentication.
        type: boolean
      password:
        description: Password for authentication.
        type: string
    type: object
  config.Config_AutoDownload:
    properties:
      cron:
        description: Cron expression for scheduling auto-downloads.
        type: string
      enabled:
        description: Whether auto-download is enabled.
        type: boolean
    type: object
  config.Config_CacheImages:
    properties:
      enabled:
        description: Whether to enable caching of images.
        type: boolean
    type: object
  config.Config_CustomNotification:
    properties:
      enabled:
        description: Whether custom notifications are enabled.
        type: boolean
      include_image:
        description: Whether to include an image with the custom notification.
        type: boolean
      message:
        description: Message for the custom notification.
        type: string
      title:
        description: Title for the custom notification.
        type: string
    type: object
  config.Config_Database:
    properties:
      dsn:
        description: Data Source Name for the database connection (if applicable).
        type: string
      host:
        description: Hostname or IP address of the database server (if applicable).
        type: string
      name:
        description: Name of the database to connect to.
        type: string
      password:
        description: Password for database authentication (if applicable).
        type: string
      path:
        description: File path for the database (if applicable, e.g., for SQLite).
        type: string
      port:
        description: Port number of the database server (if applicable).
        type: integer
      type:
        description: Type of database (e.g., "sqlite", "mysql", "postgresql").
        type: string
      user:
        description: Username for database authentication (if applicable).
        type: string
    type: object
  config.Config_Images:
    properties:
      cache_images:
        allOf:
        - $ref: '#/definitions/config.Config_CacheImages'
        description: Settings for caching images.
      kometa:
        allOf:
        - $ref: '#/definitions/config.Config_Kometa'
        description: Settings for Kometa asset directory integration (Plex only).
      save_images_locally:
        allOf:
        - $ref: '#/definitions/config.Config_SaveImagesLocally'
        description: Settings for saving images locally alongside content.
    type: object
  config.Config_Kometa:
    properties:
      asset_directory:
        description: 'Path to the Kometa asset directory (the same directory Kometa
          reads assets from). Uses the folder-per-item (asset_folders: true) layout.'
        type: string
      enabled:
        description: Whether to write downloaded images into the Kometa asset directory
          using Kometa naming conventions. Plex exclusive feature.
        type: boolean
      import_cron:
        description: Optional cron expression for periodically importing existing
          Kometa assets. Empty means import is manual only.
        type: string
      library_asset_folders:
        additionalProperties:
          type: string
        description: Optional per-library subfolder (relative to AssetDirectory) keyed
          by Plex library title. When set, a library's assets are written to <AssetDirectory>/<subfolder>/<item>/...
          instead of directly under AssetDirectory. Must match the per-library asset_directory
          configured in Kometa itself. A library with no entry keeps writing flat
          to AssetDirectory.
        type: object
      sonarr_radarr_fallback:
        description: When a media-server lookup fails (e.g. Plex returns a 404) but
          the item exists in Sonarr/Radarr, still write the downloaded images into
          the Kometa asset directory, deriving the asset folder name from the Sonarr/Radarr
          path. Requires Enabled. Plex exclusive feature.
        type: boolean
    type: object
  config.Config_LabelsAndTags:
    properties:
      applications:
        items:
          $ref: '#/definitions/config.Config_LabelsAndTagsProvider'
        type: array
      remove_overlay_label_only_on_poster_download:
        description: Whether to remove the "Overlay" label from media items after
          downloading a poster image. This is to allow Kometa to reprocess the image
          and apply the overlays. This is a Plex exclusive feature and should be set
          to true if you have "Overlay" in your "Remove" list for the Plex application
          under "LabelsAndTags".
        type: boolean
    type: object
  config.Config_LabelsAndTagsProvider:
    properties:
      add:
        items:
          type: string
        type: array
      add_label_tag_for_selected_types:
        type: boolean
      application:
        type: string
      enabled:
        type: boolean
      remove:
        items:
          type: string
        type: array
    type: object
  config.Config_Logging:
    properties:
      file:
        description: File path for logging output.
        type: string
      level:
        description: Logging level (e.g., TRACE, DEBUG, INFO, WARN, ERROR).
        type: string
    type: object
  config.Config_MediaServer:
    properties:
      api_token:
        description: Authentication token for accessing the media server.
        type: string
      enable_plex_event_listener:
        description: Whether to enable the Plex event listener for reapplying images
          on refresh. Plex exclusive feature.
        type: boolean
      enable_sort_by_episode_added_date:
        description: Whether to check episodes for added date when getting Media Items.
          This is only for Plex servers.
        type: boolean
      libraries:
        description: List of media server libraries to manage.
        items:
          $ref: '#/definitions/models.LibrarySection'
        type: array
      type:
        description: Type of media server (e.g., plex, emby, jellyfin).
        type: string
      url:
        description: Base URL of the media server. This is either the IP:Port or the
          domain name (e.g., plex.domain.com).
        type: string
      user_id:
        description: User ID for accessing the media server. This is used for Emby
          and Jellyfin servers.
        type: string
    type: object
  config.Config_Mediux:
    properties:
      api_token:
        description: Authentication token for accessing MediUX services.
        type: string
      download_quality:
        description: 'Quality of the media to download from MediUX (Options: "original",
          "optimized") Defaults to "optimized".'
        type: string
    type: object
  config.Config_Notification_Discord:
    properties:
      webhook:
        description: Webhook URL for the Discord notification provider.
        type: string
    type: object
  config.Config_Notification_Gotify:
    properties:
      api_token:
        description: Token for the Gotify notification provider.
        type: string
      url:
        description: URL for the Gotify notification provider.
        type: string
    type: object
  config.Config_Notification_Provider:
    properties:
      discord:
        allOf:
        - $ref: '#/definitions/config.Config_Notification_Discord'
        description: Discord notification settings
      enabled:
        description: Whether this notification method is enabled
        type: boolean
      gotify:
        allOf:
        - $ref: '#/definitions/config.Config_Notification_Gotify'
        description: Gotify notification settings
      provider:
        description: Notification provider
        type: string
      pushover:
        allOf:
        - $ref: '#/definitions/config.Config_Notification_Pushover'
        description: Pushover notification settings
      webhook:
        allOf:
        - $ref: '#/definitions/config.Config_Notification_Webhook'
        description: Webhook notification settings
    type: object
  config.Config_Notification_Pushover:
    properties:
      api_token:
        description: Token for the Pushover notification provider.
        type: string
      user_key:
        description: UserKey for the Pushover notification provider.
        type: string
    type: object
  config.Config_Notification_Webhook:
    properties:
      headers:
        additionalProperties:
          type: string
        description: Headers for the Webhook notification provider.
        type: object
      url:
        description: URL for the Webhook notification provider.
        type: string
    type: object
  config.Config_NotificationTemplate:
    properties:
      app_startup:
        allOf:
        - $ref: '#/definitions/config.Config_CustomNotification'
        description: Custom notification settings for application startup.
      autodownload:
        allOf:
        - $ref: '#/definitions/config.Config_CustomNotification'
        description: Custom notification settings for auto-download events.
      check_for_media_item_changes_job:
        allOf:
        - $ref: '#/definitions/config.Config_CustomNotification'
        description: Custom notification settings for the media item changes job.
      download_queue:
        allOf:
        - $ref: '#/definitions/config.Config_CustomNotification'
        description: Custom notification settings for download queue events.
      new_sets_available_for_ignored_items:
        allOf:
        - $ref: '#/definitions/config.Config_CustomNotification'
        description: Custom notification settings for when new sets become available
          for ignored items.
      sonarr_notification:
        allOf:
        - $ref: '#/definitions/config.Config_CustomNotification'
        description: Custom notification settings for Sonarr events.
      test_notification:
        allOf:
        - $ref: '#/definitions/config.Config_CustomNotification'
        description: Custom notification settings for test notifications.
    type: object
  config.Config_Notifications:
    properties:
      enabled:
        description: Whether this notification method is enabled
        type: boolean
      providers:
        description: List of notification providers
        items:
          $ref: '#/definitions/config.Config_Notification_Provider'
        type: array
      templates:
        allOf:
        - $ref: '#/definitions/config.Config_NotificationTemplate'
        description: Custom notification templates for different events
    type: object
  config.Config_SaveImagesLocally:
    properties:
      enabled:
        description: Whether to save images next to their content.
        type: boolean
      episode_naming_convention:
        description: Episode naming convention for the media server. Only needed for
          Plex. Will default to match
        type: string
      path:
        description: By default, this is set to alongside the content. If set, this
          will override that behavior and save all images to this path.
        type: string
      running_on_windows:
        description: Whether the application is running on Windows. This affects path
          formatting.
        type: boolean
    type: object
  config.Config_SonarrRadarr_Apps:
    properties:
      applications:
        description: List of Sonarr/Radarr applications to integrate with.
        items:
          $ref: '#/definitions/config.Config_SonarrRadarrApp'
        type: array
    type: object
  config.Config_SonarrRadarrApp:
    properties:
      api_token:
        description: API key for accessing the Sonarr/Radarr server.
        type: string
      library:
        description: Name of the Media Server library associated with this Sonarr/Radarr
          instance.
        type: string
      type:
        description: Type of service (either "sonarr" or "radarr").
        type: string
      url:
        description: Base URL of the Sonarr/Radarr server.
        type: string
    type: object
  config.Config_TMDB:
    type: object
  config.NotificationTemplateVariableCatalog:
    properties:
      template_variables:
        additionalProperties:
          items:
            type: string
          type: array
        type: object
    type: object
  downloadqueue.Status:
    enum:
    - Success
    - Warning
    - Error
    - Idle - Queue Empty
    - Processing
    type: string
    x-enum-varnames:
    - LAST_STATUS_SUCCESS
    - LAST_STATUS_WARNING
    - LAST_STATUS_ERROR
    - LAST_STATUS_IDLE
    - LAST_STATUS_PROCESSING
  httpx.JSONResponse:
    properties:
      data: {}
      error:
        $ref: '#/definitions/logging.LogErrorInfo'
      status:
        example: success
        type: string
    type: object
  httpx.UnauthorizedResponse:
    properties:
      message:
        example: Invalid or expired token
        type: string
    type: object
  jobs.JobInfo:
    properties:
      id:
        type: integer
      job_name:
        type: string
      next_run:
        type: string
      prev_run:
        type: string
      spec:
        type: string
    type: object
  kometa.FolderOutcome:
    properties:
      detail:
        type: string
      folder:
        type: string
      images_failed:
        type: integer
      images_skipped_owned:
        description: assets not uploaded because a MediUX set owns their image type
        type: integer
      images_uploaded:
        type: integer
      managed_by_aura:
        description: one or more image types were skipped to protect MediUX selections
        type: boolean
      outcome:
        description: matched, unmatched, collection, skipped, error
        type: string
      registered_in_db:
        type: boolean
    type: object
  kometa.ImportResult:
    properties:
      collections:
        type: integer
      error:
        type: string
      finished_at:
        type: string
      folders:
        items:
          $ref: '#/definitions/kometa.FolderOutcome'
        type: array
      folders_scanned:
        type: integer
      images_failed:
        type: integer
      images_skipped_owned:
        description: assets not uploaded because a MediUX set owns their image type
        type: integer
      images_uploaded:
        type: integer
      items_registered:
        type: integer
      matched:
        type: integer
      skipped_managed_by_aura:
        description: items where at least one image type was protected
        type: integer
      started_at:
        type: string
      unmatched_folders:
        type: integer
    type: object
  logging.LogAction:
    properties:
      elapsed_us:
        description: Elapsed time for the action in microseconds
        type: integer
      error:
        allOf:
        - $ref: '#/definitions/logging.LogErrorInfo'
        description: Optional error details (omitted when nil)
      level:
        description: Optional level for UI filtering (e.g. "trace", "debug","info","warn","error")
        type: string
      name:
        description: 'Human name for the action: "Query DB", "Call External API"'
        type: string
      result:
        additionalProperties: {}
        description: Optional result data
        type: object
      status:
        description: '"success", "error", or "warn"'
        type: string
      sub_actions:
        description: Optional nested sub-actions
        items:
          $ref: '#/definitions/logging.LogAction'
        type: array
      timestamp:
        description: When the action started (useful for ordering)
        type: string
      warnings:
        additionalProperties: {}
        description: Warning message (if any)
        type: object
    type: object
  logging.LogData:
    properties:
      actions:
        description: Slice of actions within this operation
        items:
          $ref: '#/definitions/logging.LogAction'
        type: array
      elapsed_us:
        description: Elapsed time in microseconds
        type: integer
      level:
        description: Optional level for UI filtering (e.g. "trace", "debug","info","warn","error")
        type: string
      message:
        description: 'Human name for the overall operation: "Add to DB", "Fetch All
          Media Items" or Route.Path'
        type: string
      route:
        allOf:
        - $ref: '#/definitions/logging.LogRouteInfo'
        description: Optional route metadata (nil for background jobs)
      status:
        description: 'Status: "success", "error", or "warn"'
        type: string
      time:
        description: Time of the log entry (same as Timestamp, kept for compatibility)
        type: string
      timestamp:
        description: When the operation started
        type: string
    type: object
  logging.LogErrorInfo:
    properties:
      detail:
        type: object
      function:
        example: Reload
        type: string
      help:
        example: Check server logs for more details
        type: string
      line_number:
        example: 42
        type: integer
      message:
        example: Invalid or expired token
        type: string
    type: object
  logging.LogRouteInfo:
    properties:
      ip:
        description: Client IP address (middleware can capture)
        type: string
      method:
        description: HTTP method (e.g. GET, POST)
        type: string
      params:
        additionalProperties:
          items:
            type: string
          type: array
        description: 'Query/path/route params: map[string][]string to preserve multiple
          values'
        type: object
      path:
        description: Registered route path (e.g. /api/v1/media/{id})
        type: string
      response_bytes:
        description: Number of bytes written in the response (middleware can capture)
        type: integer
    type: object
  models.BaseMediuxItemInfo:
    properties:
      date_updated:
        description: Last update for the Movie/Show info
        type: string
      imdb_id:
        description: IMDB ID of the item
        type: string
      release_date:
        description: Release date of the item
        type: string
      slug:
        description: Slug of the item
        type: string
      status:
        description: Status of the item (returning, ended, etc.)
        type: string
      tagline:
        description: Tagline of the item
        type: string
      title:
        description: Title of the item
        type: string
      tmdb_backdrop_path:
        description: TMDB Backdrop path
        type: string
      tmdb_id:
        description: TMDB ID of the item
        type: string
      tmdb_poster_path:
        description: TMDB Poster path
        type: string
      trakt_id:
        description: Trakt ID of the item
        type: string
      tvdb_id:
        description: TVDB ID (for shows)
        type: string
      type:
        description: Item type (movie, show)
        type: string
    type: object
  models.BoxsetRef:
    properties:
      date_created:
        description: Creation date
        type: string
      date_updated:
        description: Last updated date
        type: string
      id:
        description: Set ID
        type: string
      popularity:
        description: Popularity score of the set
        type: integer
      popularity_global:
        description: Global popularity score of the set
        type: integer
      set_ids:
        additionalProperties:
          items:
            type: string
          type: array
        description: IDs of sets (show, movie, collection) in this boxset
        type: object
      title:
        description: Set Title
        type: string
      type:
        description: Set Type (movie, show, collection, boxset)
        type: string
      user_created:
        description: User who created the set
        type: string
    type: object
  models.CollectionItem:
    properties:
      child_count:
        type: integer
      index:
        description: Unique identifier for the collection in Plex
        type: string
      library_title:
        type: string
      media_items:
        items:
          $ref: '#/definitions/models.MediaItem'
        type: array
      rating_key:
        type: string
      summary:
        type: string
      title:
        type: string
      tmdb_id:
        type: string
    type: object
  models.CollectionQueueItem:
    properties:
      collection_item:
        $ref: '#/definitions/models.CollectionItem'
      failed_at:
        description: FailedAt is when the entry was moved to its terminal error/warning
          state.
        type: string
      images:
        items:
          $ref: '#/definitions/models.ImageFile'
        type: array
      queue_errors:
        description: QueueErrors lists the fatal reasons the entry failed to apply.
        items:
          type: string
        type: array
      queue_warnings:
        description: QueueWarnings lists non-fatal issues recorded while processing
          the entry.
        items:
          type: string
        type: array
    type: object
  models.CreatorSetsResponse:
    properties:
      boxsets:
        description: List of boxsets
        items:
          $ref: '#/definitions/models.BoxsetRef'
        type: array
      collection_sets:
        description: List of collection sets
        items:
          $ref: '#/definitions/models.SetRef'
        type: array
      included_items:
        additionalProperties:
          $ref: '#/definitions/models.IncludedItem'
        description: Map of included items by TMDB ID
        type: object
      movie_sets:
        description: List of movie sets
        items:
          $ref: '#/definitions/models.SetRef'
        type: array
      show_sets:
        description: List of show sets
        items:
          $ref: '#/definitions/models.SetRef'
        type: array
    type: object
  models.DBPosterSetDetail:
    properties:
      auto_add_new_collection_items:
        type: boolean
      auto_download:
        type: boolean
      date_created:
        description: Creation date
        type: string
      date_updated:
        description: Last updated date
        type: string
      id:
        description: Set ID
        type: string
      images:
        items:
          $ref: '#/definitions/models.ImageFile'
        type: array
      last_downloaded:
        type: string
      popularity:
        description: Popularity score of the set
        type: integer
      popularity_global:
        description: Global popularity score of the set
        type: integer
      selected_types:
        $ref: '#/definitions/models.SelectedTypes'
      title:
        description: Set Title
        type: string
      to_delete:
        description: Flag to indicate if the poster set should be deleted (Not used
          in DB)
        type: boolean
      type:
        description: Set Type (movie, show, collection, boxset)
        type: string
      user_created:
        description: User who created the set
        type: string
    type: object
  models.DBSavedItem:
    properties:
      failed_at:
        description: FailedAt is when the entry was moved to the error/warning state.
        type: string
      media_item:
        $ref: '#/definitions/models.MediaItem'
      poster_sets:
        items:
          $ref: '#/definitions/models.DBPosterSetDetail'
        type: array
      queue_errors:
        description: QueueErrors lists the fatal reasons the entry failed to download.
        items:
          type: string
        type: array
      queue_warnings:
        description: QueueWarnings lists non-fatal issues recorded while processing
          the entry.
        items:
          type: string
        type: array
    type: object
  models.DBSavedSet:
    properties:
      id:
        type: string
      selected_types:
        $ref: '#/definitions/models.SelectedTypes'
      user_created:
        type: string
    type: object
  models.ImageFile:
    properties:
      blurhash:
        description: Blurhash string for preview
        type: string
      episode_number:
        description: Present for Titlecards
        type: integer
      file_size:
        description: Size of the file in bytes
        type: integer
      id:
        description: Unique asset ID for the poster file
        type: string
      item_tmdb_id:
        description: TMDB ID of the parent item
        type: string
      language:
        description: Language Name
        type: string
      modified:
        description: Last modified date
        type: string
      season_number:
        description: Present for Season Posters and Titlecards
        type: integer
      src:
        description: Source URL (ID+Date - calculated by MediUX API)
        type: string
      title:
        description: Present for Titlecards
        type: string
      type:
        description: (poster, backdrop, seasonPoster, specialSeasonPoster, titlecard)
        type: string
    type: object
  models.IncludedItem:
    properties:
      media_item:
        allOf:
        - $ref: '#/definitions/models.MediaItem'
        description: Full media item info from Aura
      mediux_info:
        allOf:
        - $ref: '#/definitions/models.BaseMediuxItemInfo'
        description: MediUX item info
    type: object
  models.LibrarySection:
    properties:
      id:
        description: Unique identifier for the library section.
        type: string
      media_items:
        items:
          $ref: '#/definitions/models.MediaItem'
        type: array
      paths:
        description: Paths of the library section on the media server.
        items:
          type: string
        type: array
      title:
        description: Title of the library section.
        type: string
      total_size:
        type: integer
      type:
        description: '"movie" or "show"'
        type: string
    type: object
  models.MediaItem:
    properties:
      added_at:
        description: Added timestamp
        type: integer
      content_rating:
        description: Used in MediaItem Details Page - For more information about the
          item
        type: string
      db_saved_sets:
        description: Used in MediaItem Details Page - For poster sets
        items:
          $ref: '#/definitions/models.DBSavedSet'
        type: array
      guids:
        description: Used in MediaItem Details Page - For ratings
        items:
          $ref: '#/definitions/models.MediaItemGuid'
        type: array
