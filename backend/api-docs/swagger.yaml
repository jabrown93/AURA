        filtering by year, library section, and unique identifiers (TMDB ID or RatingKey)
        using specific query syntax. The response includes matching media items, collection
        items, Mediux users, and saved sets, along with metadata about the last full
        update for each category to help clients determine if they need to refresh
        their cached data.
